<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Finsec Lab</title>
    <script>
      // GitHub Pages SPA redirect — matches index.html restore script
      // Encodes path as /?/path so index.html can detect search[1]==='/'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' + l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
